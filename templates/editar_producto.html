<!DOCTYPE html>
<html>
<head>
    <title>Editar Producto</title>
</head>
<body>

<h1>Editar Producto</h1>

<form method="POST">

    <label>Nombre:</label><br>
    <input type="text" name="nombre"
           value="{{ producto[3] }}" required>
    <br><br>

    <label>Marca:</label><br>
    <input type="text" name="marca_refaccion"
           value="{{ producto[4] }}">
    <br><br>

    <label>Precio Venta:</label><br>
    <input type="number" step="0.01"
           name="precio_venta"
           value="{{ producto[9] }}"
           required>
    <br><br>

    <label>Stock:</label><br>
    <input type="number"
           name="stock"
           value="{{ producto[10] }}"
           required>
    <br><br>

    <button type="submit">
        Actualizar Producto
    </button>

</form>

<br>

<a href="/productos">
    Volver
</a>

</body>
</html>
